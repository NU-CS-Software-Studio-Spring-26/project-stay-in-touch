name: Serendipity Scheduler

on:
  schedule:
    # Run daily at 7am UTC (2am Eastern, 1am Central)
    - cron: '0 7 * * *'
  workflow_dispatch:  # allow manual runs

jobs:
  schedule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scheduler
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python scripts/scheduler.py

      - name: Commit state changes
        run: |
          git config user.name "Serendipity Bot"
          git config user.email "bot@serendipity"
          git add state.json
          git diff --staged --quiet || git commit -m "Update scheduling state [skip ci]"
          git push
