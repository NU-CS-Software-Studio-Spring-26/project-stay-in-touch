name: Secret Scan

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Pin the gitleaks version so CI stays reproducible. Bump deliberately.
      GITLEAKS_VERSION: 8.30.1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Need full history so gitleaks can scan every commit in the PR,
          # not just the diff against the base.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --verbose \
            --exit-code 1
